<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shambhavi Mahamudra Kriya Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/"
  }
}
</script>
<style>
    @keyframes breathing-bg {
        0%, 100% { background-color: #0d1421; }
        50% { background-color: #111827; }
    }
    .animate-breathing-bg {
        animation: breathing-bg 10s ease-in-out infinite;
    }
    @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
    }
    .animate-fade-in {
        animation: fade-in 1s ease-out forwards;
    }
    @keyframes fade-in-slow {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-slow {
        animation: fade-in-slow 1.5s ease-out forwards;
    }
    @keyframes subtle-pulse {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.03); opacity: 1; }
    }
    .animate-subtle-pulse {
        animation: subtle-pulse 4s ease-in-out infinite;
    }
</style>
</head>
  <body class="bg-gray-900 min-h-screen m-0">
    <div id="root" class="min-h-screen"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
